# ============================================
# Agent 研发团队 CI/CD 流水线
# ============================================
# 触发器：推送到 master 或 PR 到 master 时自动执行
# 质量门禁：Lint → Build → Test → 全部通过方可部署

name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ==================== 前端检查 ====================
  frontend-lint-build:
    name: "前端 - Lint + Build"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [blog-frontend, blog-admin]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: 安装依赖
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Gate 1: TypeScript 类型检查
        working-directory: ${{ matrix.project }}
        run: npx vue-tsc --noEmit

      - name: Gate 2: 生产构建
        working-directory: ${{ matrix.project }}
        run: npm run build

      - name: 验证构建产物
        working-directory: ${{ matrix.project }}
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Gate 2 失败: 缺少 dist/index.html"
            exit 1
          fi
          echo "✅ ${{ matrix.project }} 构建验证通过"

  # ==================== 后端检查 ====================
  backend-compile-test:
    name: "后端 - Compile + Test"
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Gate 1: 编译验证
        working-directory: blog-server
        run: mvn compile -B

      - name: Gate 2: 单元测试
        working-directory: blog-server
        run: mvn test -B

      - name: Gate 2b: 打包验证
        working-directory: blog-server
        run: mvn package -DskipTests -B

      - name: 验证构建产物
        working-directory: blog-server
        run: |
          JAR_COUNT=$(find target -name "*.jar" -not -name "*-sources.jar" | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "❌ Gate 2b 失败: 未生成 JAR 包"
            exit 1
          fi
          echo "✅ 后端构建验证通过，生成 $JAR_COUNT 个 JAR"

  # ==================== 汇总报告 ====================
  ci-report:
    name: "CI 报告汇总"
    needs: [frontend-lint-build, backend-compile-test]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 汇总结果
        run: |
          echo "=== Agent Team CI 报告 ==="
          echo "前端 Lint+Build: ${{ needs.frontend-lint-build.result }}"
          echo "后端 Compile+Test: ${{ needs.backend-compile-test.result }}"

          if [ "${{ needs.frontend-lint-build.result }}" != "success" ] || [ "${{ needs.backend-compile-test.result }}" != "success" ]; then
            echo "❌ 质量门禁未通过，阻断部署"
            exit 1
          fi
          echo "✅ 所有质量门禁通过，可安全部署"
