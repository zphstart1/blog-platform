# =============================================
# 博客系统 Nginx 配置
# 路由: / → 读者前端  /admin/ → 管理后台  /api/ → 后端
# =============================================

upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # 上传图片
    location /img/ {
        alias /usr/share/nginx/img-dist/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 管理后台 SPA (/admin 路由，精确匹配重定向)
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        root /usr/share/nginx;
        try_files $uri $uri/ /admin/index.html;
        index index.html;
    }

    # API 代理到 Spring Boot
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 上传超时
        client_max_body_size 5m;
    }

    # 读者前端 SPA (默认路由)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # 静态资源缓存 (注意: 需要同时处理 /admin/ 和 / 路径下的资源)
    location ~* ^/admin/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全加固
    location ~ /\. {
        deny all;
    }
}
