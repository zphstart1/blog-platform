server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    password:
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: BlogPlatformSecretKey2026ForJwtTokenGenerationMinimum256BitsRequired!!
  expiration: 604800000  # 7天(ms)

# Knife4j 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 图片上传存储配置
upload:
  image-path: /data/blog/img
  allowed-types: jpg,jpeg,png,gif,webp
  max-size: 5242880  # 5MB

# 评论频率限制
rate-limit:
  comment-visitor-per-minute: 3
  comment-user-per-minute: 5
  login-fail-per-15min: 5

logging:
  level:
    com.blog: INFO
    com.blog.mapper: DEBUG