# ============================================
# Agent 研发团队集群配置文件
# ============================================
# 你只需与 Team Lead 交互，由 TA 驱动整个团队完成交付

team:
  name: "dev-team"
  description: "全栈研发团队 - 从需求到上线的完整交付流水线"

# 团队成员定义
members:
  - id: "team-lead"
    role: "技术团队领导"
    level: "leader"
    description: "唯一对外接口人，负责接收任务、协调团队、把控全局"
    communicates_with: ["product-manager", "architect", "senior-dev", "frontend-dev", "qa-tester", "devops"]
    
  - id: "product-manager"
    role: "产品经理"
    level: "member"
    description: "负责需求评审、PRD 编写、需求优先级排序、验收标准定义"
    communicates_with: ["team-lead"]
    
  - id: "architect"
    role: "架构师"
    level: "member"
    description: "负责技术方案设计、架构评审、技术选型、数据库设计"
    communicates_with: ["team-lead"]
    
  - id: "senior-dev"
    role: "Java资深开发"
    level: "member"
    description: "负责代码实现、单元测试编写、技术方案落地"
    communicates_with: ["team-lead"]
    
  - id: "frontend-dev"
    role: "资深前端开发"
    level: "member"
    description: "负责前端页面开发、接口联调、组件封装、前端自检"
    communicates_with: ["team-lead"]
    
  - id: "qa-tester"
    role: "测试工程师"
    level: "member"
    description: "负责测试用例设计、功能测试、回归测试、质量报告"
    communicates_with: ["team-lead"]
    
  - id: "devops"
    role: "运维工程师"
    level: "member"
    description: "负责部署上线、环境管理、监控告警、回滚方案"
    communicates_with: ["team-lead"]

# 完整交付流水线
pipeline:
  stages:
    - name: "需求评审"
      owner: "product-manager"
      reviewer: "team-lead"
      output: "PRD 文档 + 需求评审报告"
      
    - name: "技术方案"
      owner: "architect"
      reviewer: "team-lead"
      input: "PRD 文档"
      output: "技术设计文档 + 接口文档 + 数据库设计"
      
    - name: "代码实现"
      owners: ["senior-dev", "frontend-dev"]
      parallel: true
      reviewer: "team-lead"
      input: "技术设计文档"
      output: "后端代码 + 单元测试 + 前端代码"
      
    - name: "测试验证"
      owner: "qa-tester"
      reviewer: "team-lead"
      input: "功能代码 + 技术设计文档"
      output: "测试报告 + Bug 清单"
      
    - name: "部署上线"
      owner: "devops"
      reviewer: "team-lead"
      input: "通过测试的代码 + 上线方案"
      output: "上线完成确认 + 监控配置"
      
    - name: "交付产品"
      owner: "team-lead"
      input: "所有阶段输出"
      output: "交付报告 + 知识沉淀文档"
